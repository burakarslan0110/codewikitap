name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs of the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Test + Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pin to 10.33.4. Do NOT use "latest" — pnpm 11.x adds an interactive
          # approval gate on top of onlyBuiltDependencies that conflicts with
          # our dangerouslyAllowAllBuilds flag.
          version: 10.33.4

      - name: Setup Node.js 22.5+
        uses: actions/setup-node@v4
        with:
          # package.json engines.node = ">=22.5.0"; runtime_check.ts
          # hard-exits on lower versions. Pin to 22.5.x major series.
          node-version: 22.x
          cache: pnpm

      - name: Smoke-check pnpm major
        # Fail-fast if action-setup version pin drifted; we depend on the 10.x
        # API surface (dangerouslyAllowAllBuilds via setup-deps script).
        run: |
          set -e
          ACTUAL=$(pnpm --version)
          echo "pnpm --version: $ACTUAL"
          echo "$ACTUAL" | grep -E '^10\.' || (echo "::error::Expected pnpm 10.x, got $ACTUAL" && exit 1)

      - name: Install dependencies (with native build approval)
        run: pnpm setup-deps

      - name: Install Playwright headless shell
        # Integration + audit tests need the chromium-headless-shell binary.
        run: npx playwright install --only-shell chromium

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm run test:integration

      # Audit harness is intentionally NOT run in CI.
      # It is a manual-only regression suite — see CLAUDE.md "Vitest projects":
      # `pnpm test` and `pnpm run test:all` deliberately exclude `audit`;
      # only `pnpm run audit` runs it. Several audit cases also depend on
      # `docs/plans/*.md` files, which are gitignored (local-only spec history),
      # so the suite can never be green in CI without committing those plans.
      # Run `pnpm run audit` locally before tagging a release.
